<div class="container app-page">
  <section class="app-page__hero">
    <div>
      <span class="page-kicker"><i class="bi bi-person-badge-fill"></i> Clients</span>
      <h1 class="page-title mt-2">Clients</h1>
    </div>
    <div class="app-page__hero-actions">
      <span class="badge rounded-pill">{{ clients.length }} records</span>
      <button *ngIf="canManageClients" class="btn btn-light app-icon-btn" type="button" (click)="addClient()">
        <i class="bi bi-person-plus-fill"></i><span>Add client</span>
      </button>
    </div>
  </section>

  <div class="card app-page__surface">
    <div class="card-header app-page__card-title">
      <div class="app-page__toolbar-copy">
        <span class="app-page__section-label"><i class="bi bi-folder2-open"></i> Directory</span>
        <h3>Clients</h3>
      </div>
    </div>
    <div class="card-body p-0">
      <app-loader *ngIf="loading"></app-loader>
      <div class="table-responsive" *ngIf="!loading">
        <table class="table align-middle mb-0">
          <thead>
            <tr>
              <th>Name</th>
              <th>Location</th>
              <th class="text-end" *ngIf="canManageClients">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let client of clients">
              <td><span class="fw-bold">{{ client.clientName }}</span></td>
              <td class="text-muted">{{ client.clientLocation || '-' }}</td>
              <td *ngIf="canManageClients" class="text-end">
                <div class="app-table-actions justify-content-end">
                  <a class="btn btn-sm btn-warning app-icon-btn app-icon-btn--icon-only" [routerLink]="['/clients/edit', client.clientId]" title="Edit">
                    <i class="bi bi-pencil-square"></i>
                  </a>
                  <button class="btn btn-sm btn-danger app-icon-btn app-icon-btn--icon-only" type="button" (click)="deleteClient(client.clientId)" title="Delete">
                    <i class="bi bi-trash3"></i>
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <div *ngIf="!loading && clients.length === 0" class="app-page__empty m-3">No clients found.</div>
    </div>
  </div>
</div>
