<app-navbar></app-navbar>

<div class="container mt-4">

  <div class="row g-4">

    <div class="col-lg-4" *ngIf="canManageClients">

      <div class="card shadow h-100">

        <div class="card-header">
          <h3 class="mb-0">{{ editingClientId ? 'Update Client' : 'Add Client' }}</h3>
        </div>

        <div class="card-body">
          <form [formGroup]="clientForm" (ngSubmit)="saveClient()">
            <div class="mb-3">
              <label class="form-label">Client Name</label>
              <input type="text" class="form-control" formControlName="clientName">
              <div class="text-danger mt-1" *ngIf="f['clientName'].touched && f['clientName'].invalid">
                Client name is required
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Client Address</label>
              <textarea class="form-control" rows="3" formControlName="clientAddress"></textarea>
            </div>

            <div class="mb-3">
              <label class="form-label">Client Phone Number</label>
              <input type="text" class="form-control" formControlName="clientPhoneNumber">
            </div>

            <div class="mb-3">
              <label class="form-label">Client Location</label>
              <input type="text" class="form-control" formControlName="clientLocation">
            </div>

            <div class="d-flex gap-2">
              <button class="btn btn-primary" type="submit">{{ editingClientId ? 'Update' : 'Create' }}</button>
              <button class="btn btn-outline-secondary" type="button" *ngIf="editingClientId" (click)="cancelEdit()">Cancel</button>
            </div>
          </form>
        </div>
      </div>

    </div>

    <div class="col-lg-8" [class.col-lg-12]="!canManageClients">

      <div class="card shadow h-100">

        <div class="card-header d-flex justify-content-between align-items-center">
          <h3 class="mb-0">Clients</h3>
          <span class="badge bg-secondary">{{ clients.length }} records</span>
        </div>

        <div class="card-body">
          <app-loader *ngIf="loading"></app-loader>

          <div class="table-responsive" *ngIf="!loading">
            <table class="table table-striped align-middle mb-0">
              <thead>
                <tr>
                  <th>Id</th>
                  <th>Name</th>
                  <th>Location</th>
                  <th *ngIf="canManageClients">Actions</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let client of clients">
                  <td>{{ client.clientId }}</td>
                  <td>{{ client.clientName }}</td>
                  <td>{{ client.clientLocation || '-' }}</td>
                  <td class="text-nowrap" *ngIf="canManageClients">
                    <button class="btn btn-sm btn-warning me-2" (click)="editClient(client)">Edit</button>
                    <button class="btn btn-sm btn-danger" (click)="deleteClient(client.clientId)">Delete</button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>

  </div>
</div>
