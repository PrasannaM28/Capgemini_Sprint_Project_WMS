<div class="container app-page">
  <section class="app-page__hero">
    <div>
      <span class="page-kicker"><i class="bi bi-person-badge-fill"></i> Clients</span>
      <h1 class="page-title mt-2">{{ pageHeading }}</h1>
    </div>
    <div class="app-page__hero-actions">
      <button class="btn btn-light app-icon-btn" type="button" (click)="cancel()">
        <i class="bi bi-arrow-left"></i><span>Back to clients</span>
      </button>
    </div>
  </section>

  <div class="card app-page__surface">
    <div class="card-header app-page__card-title">
      <span class="app-page__section-label"><i class="bi bi-pencil-square"></i> Details</span>
      <h3>{{ isEditMode ? 'Edit Client' : 'New Client' }}</h3>
    </div>
    <div class="card-body">
      <app-loader *ngIf="loading"></app-loader>
      <form [formGroup]="clientForm" (ngSubmit)="saveClient()" *ngIf="!loading">
        <div class="mb-3">
          <label class="form-label">Client Name</label>
          <input type="text" class="form-control" formControlName="clientName" placeholder="Enter client name">
          <div class="text-danger mt-1 small" *ngIf="f['clientName'].touched && f['clientName'].invalid">Client name is required</div>
        </div>

        <div class="mb-3">
          <label class="form-label">Client Address</label>
          <textarea class="form-control" rows="3" formControlName="clientAddress" placeholder="Enter address"></textarea>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Phone Number</label>
            <input type="text" class="form-control" formControlName="clientPhoneNumber" placeholder="Enter phone number">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Location</label>
            <input type="text" class="form-control" formControlName="clientLocation" placeholder="Enter location">
          </div>
        </div>

        <div class="d-flex gap-2 flex-wrap">
          <button class="btn btn-primary app-icon-btn" type="submit">
            <i class="bi bi-save2-fill"></i><span>{{ isEditMode ? 'Update' : 'Create' }}</span>
          </button>
          <button class="btn btn-outline-secondary app-icon-btn" type="button" (click)="cancel()">
            <i class="bi bi-x-lg"></i><span>Cancel</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
