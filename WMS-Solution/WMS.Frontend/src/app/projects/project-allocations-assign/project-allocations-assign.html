<div class="container app-page">
  <section class="app-page__hero">
    <div>
      <span class="page-kicker"><i class="bi bi-person-plus-fill"></i> Assignments</span>
      <h1 class="page-title mt-2">Assign Team Member</h1>
    </div>
    <div class="app-page__hero-actions">
      <button class="btn btn-light app-icon-btn" type="button" (click)="cancel()">
        <i class="bi bi-arrow-left"></i><span>Back to allocations</span>
      </button>
    </div>
  </section>

  <div class="card app-page__surface">
    <div class="card-header app-page__card-title">
      <span class="app-page__section-label"><i class="bi bi-person-plus-fill"></i> Allocation</span>
      <h3>Assign to Project</h3>
    </div>
    <div class="card-body">
      <app-loader *ngIf="loading"></app-loader>
      <form [formGroup]="allocationForm" (ngSubmit)="assign()" *ngIf="!loading">
        <div class="mb-3">
          <label class="form-label">Employee</label>
          <select class="form-select" formControlName="empId">
            <option [ngValue]="null">Select employee</option>
            <option *ngFor="let employee of employees" [ngValue]="employee.employeeId">{{ employee.fullName }}</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Project</label>
          <select class="form-select" formControlName="projectId">
            <option [ngValue]="null">Select project</option>
            <option *ngFor="let project of projects" [ngValue]="project.projectId">{{ project.projectName }}</option>
          </select>
        </div>

        <div class="d-flex gap-2 flex-wrap">
          <button class="btn btn-primary app-icon-btn" type="submit">
            <i class="bi bi-person-check-fill"></i><span>Assign</span>
          </button>
          <button class="btn btn-outline-secondary app-icon-btn" type="button" (click)="cancel()">
            <i class="bi bi-x-lg"></i><span>Cancel</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
