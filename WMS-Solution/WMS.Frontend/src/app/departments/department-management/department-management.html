<div class="container app-page">
  <section class="app-page__hero">
    <div>
      <span class="page-kicker"><i class="bi bi-building"></i> Organization</span>
      <h1 class="page-title mt-2">Departments</h1>
    </div>
    <div class="app-page__hero-actions">
      <span class="badge rounded-pill">{{ departments.length }} records</span>
      <button *ngIf="canManageDepartments" class="btn btn-light app-icon-btn" type="button" (click)="addDepartment()">
        <i class="bi bi-plus-circle-fill"></i><span>Add department</span>
      </button>
    </div>
  </section>

  <div class="card app-page__surface">
    <div class="card-header app-page__card-title">
      <div class="app-page__toolbar-copy">
        <span class="app-page__section-label"><i class="bi bi-building"></i> Directory</span>
        <h3>Departments</h3>
      </div>
    </div>
    <div class="card-body p-0">
      <app-loader *ngIf="loading"></app-loader>
      <div class="table-responsive" *ngIf="!loading">
        <table class="table align-middle mb-0">
          <thead>
            <tr>
              <th>Name</th>
              <th>Description</th>
              <th class="text-end" *ngIf="canManageDepartments">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let department of departments">
              <td><span class="fw-bold">{{ department.departmentName }}</span></td>
              <td class="text-muted">{{ department.description || '-' }}</td>
              <td *ngIf="canManageDepartments" class="text-end">
                <div class="app-table-actions justify-content-end">
                  <a class="btn btn-sm btn-warning app-icon-btn app-icon-btn--icon-only" [routerLink]="['/departments/edit', department.departmentId]" title="Edit">
                    <i class="bi bi-pencil-square"></i>
                  </a>
                  <button class="btn btn-sm btn-danger app-icon-btn app-icon-btn--icon-only" type="button" (click)="deleteDepartment(department.departmentId)" title="Delete">
                    <i class="bi bi-trash3"></i>
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <div *ngIf="!loading && departments.length === 0" class="app-page__empty m-3">No departments found.</div>
    </div>
  </div>
</div>
