<app-navbar></app-navbar>

<div class="container mt-4">

  <div class="card shadow">

    <div class="card-header">

      <h3>
        Edit Employee
      </h3>

    </div>

    <div class="card-body">

      <app-loader
        *ngIf="loading">

      </app-loader>

      <form
        [formGroup]="employeeForm"
        (ngSubmit)="update()">

        <div class="row">

          <div class="col-md-6 mb-3">

            <label>
              First Name
            </label>

            <input
              type="text"
              class="form-control"
              formControlName=
                "firstName">

            <div
              class="text-danger mt-1"

              *ngIf="
                f['firstName']
                .touched
                &&
                f['firstName']
                .invalid
              ">

              First Name is required

            </div>

          </div>

          <div class="col-md-6 mb-3">

            <label>
              Last Name
            </label>

            <input
              type="text"
              class="form-control"
              formControlName=
                "lastName">

            <div
              class="text-danger mt-1"

              *ngIf="
                f['lastName']
                .touched
                &&
                f['lastName']
                .invalid
              ">

              Last Name is required

            </div>

          </div>

        </div>

        <div class="mb-3">

          <label>
            Phone Number
          </label>

          <input
            type="text"
            class="form-control"
            formControlName=
              "phoneNumber">

          <div
            class="text-danger mt-1"

            *ngIf="
              f['phoneNumber']
              .touched
              &&
              f['phoneNumber']
              .invalid
            ">

            Valid Phone Number required

          </div>

        </div>

        <div class="row">

          <div class="col-md-6 mb-3">

            <label>
              Gender
            </label>

            <select
              class="form-select"
              formControlName="gender">

              <option value="">
                Select
              </option>

              <option [ngValue]="1">
                Male
              </option>

              <option [ngValue]="2">
                Female
              </option>

              <option [ngValue]="3">
                Other
              </option>

            </select>

            <div
              class="text-danger mt-1"

              *ngIf="
                f['gender']
                .touched
                &&
                f['gender']
                .invalid
              ">

              Gender is required

            </div>

          </div>

          <div class="col-md-6 mb-3">

            <label>
              Department Id
            </label>

            <input
              type="number"
              class="form-control"
              formControlName="departmentId">

            <div
              class="text-danger mt-1"

              *ngIf="
                f['departmentId']
                .touched
                &&
                f['departmentId']
                .invalid
              ">

              Department is required

            </div>

          </div>

        </div>

        <div class="mb-3">

          <label>
            Role Id
          </label>

          <input
            type="number"
            class="form-control"
            formControlName="roleId">

          <div
            class="text-danger mt-1"

            *ngIf="
              f['roleId']
              .touched
              &&
              f['roleId']
              .invalid
            ">

            Role is required

          </div>

        </div>

        <button
          class="btn btn-primary"
          type="submit">

          Update

        </button>

      </form>

    </div>

  </div>

</div>
