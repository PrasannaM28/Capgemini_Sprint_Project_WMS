<app-navbar></app-navbar>

<div class="container mt-4">

  <div class="card shadow">

    <div class="card-header">

      <h3>
        Create Employee
      </h3>

    </div>

    <div class="card-body">

      <form
        [formGroup]="employeeForm"
        (ngSubmit)="create()">

        <div class="row">

          <div class="col-md-6 mb-3">

            <label>
              First Name
            </label>

            <input
              type="text"
              class="form-control"
              formControlName="firstName">

            <div
              class="text-danger mt-1"

              *ngIf="
                f['firstName']
                .touched
                &&
                f['firstName']
                .invalid
              ">

              <div
                *ngIf="
                  f['firstName']
                  .errors?.['required']
                ">

                First Name is required

              </div>

              <div
                *ngIf="
                  f['firstName']
                  .errors?.['minlength']
                ">

                Minimum 2 characters required

              </div>

            </div>

          </div>

          <div class="col-md-6 mb-3">

            <label>
              Last Name
            </label>

            <input
              type="text"
              class="form-control"
              formControlName="lastName">

            <div
              class="text-danger mt-1"

              *ngIf="
                f['lastName']
                .touched
                &&
                f['lastName']
                .invalid
              ">

              <div
                *ngIf="
                  f['lastName']
                  .errors?.['required']
                ">

                Last Name is required

              </div>

            </div>

          </div>

        </div>

        <div class="row">

          <div class="col-md-6 mb-3">

            <label>
              Email
            </label>

            <input
              type="email"
              class="form-control"
              formControlName="email">

            <div
              class="text-danger mt-1"

              *ngIf="
                f['email']
                .touched
                &&
                f['email']
                .invalid
              ">

              <div
                *ngIf="
                  f['email']
                  .errors?.['required']
                ">

                Email is required

              </div>

              <div
                *ngIf="
                  f['email']
                  .errors?.['email']
                ">

                Invalid email format

              </div>

            </div>

          </div>

          <div class="col-md-6 mb-3">

            <label>
              Phone Number
            </label>

            <input
              type="text"
              class="form-control"
              formControlName="phoneNumber">

            <div
              class="text-danger mt-1"

              *ngIf="
                f['phoneNumber']
                .touched
                &&
                f['phoneNumber']
                .invalid
              ">

              <div
                *ngIf="
                  f['phoneNumber']
                  .errors?.['required']
                ">

                Phone Number is required

              </div>

              <div
                *ngIf="
                  f['phoneNumber']
                  .errors?.['pattern']
                ">

                Enter valid 10 digit number

              </div>

            </div>

          </div>

        </div>

        <div class="row">

          <div class="col-md-6 mb-3">

            <label>
              Gender
            </label>

            <select
              class="form-select"
              formControlName="gender">

              <option value="">
                Select
              </option>

              <option [ngValue]="1">
                Male
              </option>

              <option [ngValue]="2">
                Female
              </option>

              <option [ngValue]="3">
                Other
              </option>

            </select>

            <div
              class="text-danger mt-1"

              *ngIf="
                f['gender']
                .touched
                &&
                f['gender']
                .invalid
              ">

              Gender is required

            </div>

          </div>

          <div class="col-md-6 mb-3">

            <label>
              Date of Birth
            </label>

            <input
              type="date"
              class="form-control"
              formControlName="dob"
              [max]="maxDobDate">

            <div
              class="text-danger mt-1"

              *ngIf="
                f['dob']
                .touched
                &&
                f['dob']
                .invalid
              ">

              Date of Birth is required

            </div>

          </div>

        </div>

        <div class="row">

          <div class="col-md-6 mb-3">

            <label>
              Date of Joining
            </label>

            <input
              type="date"
              class="form-control"
              formControlName="doj"
              [max]="maxDojDate">

            <div
              class="text-danger mt-1"

              *ngIf="
                f['doj']
                .touched
                &&
                f['doj']
                .invalid
              ">

              Date of Joining is required

            </div>

          </div>

          <div class="col-md-6 mb-3">

            <label>
              Department Id
            </label>

            <input
              type="number"
              class="form-control"
              formControlName=
                "departmentId">

            <div
              class="text-danger mt-1"

              *ngIf="
                f['departmentId']
                .touched
                &&
                f['departmentId']
                .invalid
              ">

              Department is required

            </div>

          </div>

        </div>

        <div class="mb-3">

          <label>
            Role Id
          </label>

          <input
            type="number"
            class="form-control"
            formControlName="roleId">

          <div
            class="text-danger mt-1"

            *ngIf="
              f['roleId']
              .touched
              &&
              f['roleId']
              .invalid
            ">

            Role is required

          </div>

        </div>

        <button
          type="submit"
          class="btn btn-success">

          Save

        </button>

      </form>

    </div>

  </div>

</div>
