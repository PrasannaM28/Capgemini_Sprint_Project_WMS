<div class="change-password-page">
  <div class="container py-5 change-password-page__container">
    <div class="row justify-content-center">
      <div class="col-lg-5 col-xl-4">
        <div class="card change-password-card">
          <div class="card-header text-center border-0 bg-transparent pt-4 px-4">
            <div class="auth-logo mx-auto mb-3" style="width: 3.5rem; height: 3.5rem;">
              <i class="bi bi-key-fill fs-3"></i>
            </div>
            <span class="page-kicker"><i class="bi bi-shield-check"></i> Security</span>
            <h3 class="mb-0 mt-3">Change Password</h3>
            <p class="change-password-card__copy mb-0 mt-2">Update your credentials to keep your account secure.</p>
          </div>
          <div class="card-body p-4 p-lg-5">
            <div *ngIf="errorMessage" class="auth-inline-alert mb-3"><i class="bi bi-exclamation-triangle-fill me-2"></i>{{ errorMessage }}</div>
            <form [formGroup]="changePasswordForm" (ngSubmit)="submit()">
              <div class="mb-3">
                <label class="form-label">Current Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-lock"></i></span>
                  <input [type]="showCurrentPassword ? 'text' : 'password'" class="form-control border-start-0 ps-0" formControlName="currentPassword" autocomplete="current-password" placeholder="Enter current password">
                  <button type="button" class="btn btn-outline-secondary auth-password-toggle" (click)="toggleCurrentPassword()">
                    <i [class]="showCurrentPassword ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
                  </button>
                </div>
                <div class="text-danger mt-1 small" *ngIf="f['currentPassword'].touched && f['currentPassword'].invalid">Current password is required</div>
              </div>
              <div class="mb-3">
                <label class="form-label">New Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-lock"></i></span>
                  <input [type]="showNewPassword ? 'text' : 'password'" class="form-control border-start-0 ps-0" formControlName="newPassword" autocomplete="new-password" placeholder="Enter new password">
                  <button type="button" class="btn btn-outline-secondary auth-password-toggle" (click)="toggleNewPassword()">
                    <i [class]="showNewPassword ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
                  </button>
                </div>
                <div class="text-danger mt-1 small" *ngIf="f['newPassword'].touched && f['newPassword'].invalid">
                  <div *ngIf="f['newPassword'].errors?.['required']">New password is required</div>
                  <div *ngIf="f['newPassword'].errors?.['minlength']">Minimum 6 characters required</div>
                </div>
              </div>
              <div class="mb-4">
                <label class="form-label">Confirm New Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-lock"></i></span>
                  <input [type]="showConfirmNewPassword ? 'text' : 'password'" class="form-control border-start-0 ps-0" formControlName="confirmNewPassword" autocomplete="new-password" placeholder="Confirm new password">
                  <button type="button" class="btn btn-outline-secondary auth-password-toggle" (click)="toggleConfirmNewPassword()">
                    <i [class]="showConfirmNewPassword ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
                  </button>
                </div>
                <div class="text-danger mt-1 small" *ngIf="f['confirmNewPassword'].touched && f['confirmNewPassword'].invalid">Confirm new password is required</div>
              </div>
              <button type="submit" class="btn btn-primary w-100 btn-lg" [disabled]="loading">
                <i class="bi bi-check2-circle me-2"></i>{{ loading ? 'Updating...' : 'Update Password' }}
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
