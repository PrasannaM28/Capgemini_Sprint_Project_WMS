<div class="container app-page">
  <section class="app-page__hero">
    <div>
      <span class="page-kicker"><i class="bi bi-diagram-3-fill"></i> Assignments</span>
      <h1 class="page-title mt-2">Allocations</h1>
    </div>
    <div class="app-page__hero-actions">
      <span class="badge rounded-pill">{{ projectAllocations.length }} records</span>
      <button *ngIf="canAssignTeam" class="btn btn-light app-icon-btn" type="button" (click)="assignTeam()">
        <i class="bi bi-person-plus-fill"></i><span>Assign team</span>
      </button>
    </div>
  </section>

  <div class="card app-page__surface">
    <div class="card-header app-page__card-title">
      <div class="app-page__toolbar-copy">
        <span class="app-page__section-label"><i class="bi bi-diagram-3-fill"></i> Assignments</span>
        <h3>Team Members</h3>
      </div>
      <form [formGroup]="searchForm">
        <div class="input-group" style="max-width: 360px;">
          <input type="text" class="form-control" placeholder="Search by employee or project" formControlName="searchTerm">
          <button class="btn btn-primary" type="button" (click)="search()">
            <i class="bi bi-search"></i>
          </button>
        </div>
      </form>
    </div>
    <div class="card-body p-0">
      <app-loader *ngIf="loading"></app-loader>
      <div class="table-responsive" *ngIf="!loading">
        <table class="table align-middle mb-0">
          <thead>
            <tr>
              <th>Project</th>
              <th>Employee</th>
              <th>Assigned On</th>
              <th class="text-end" *ngIf="canAssignTeam">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let allocation of filteredProjectAllocations">
              <td><span class="fw-bold">{{ allocation.projectName }}</span></td>
              <td>{{ allocation.employeeName }}</td>
              <td class="text-muted">{{ allocation.assignedOn ? (allocation.assignedOn | date:'mediumDate') : '-' }}</td>
              <td *ngIf="canAssignTeam" class="text-end">
                <button class="btn btn-sm btn-outline-danger app-icon-btn app-icon-btn--compact" type="button" (click)="deassignMember(allocation)">
                  <i class="bi bi-person-dash-fill"></i><span>Remove</span>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <div *ngIf="!loading && filteredProjectAllocations.length === 0" class="app-page__empty m-3">No allocations found.</div>
    </div>
  </div>
</div>
