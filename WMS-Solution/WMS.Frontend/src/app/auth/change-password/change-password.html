<div class="change-password-page">

  <div class="container py-5">

    <div class="row justify-content-center">

      <div class="col-md-5 col-lg-4">

        <div class="card shadow-sm change-password-card">

          <div class="card-header text-center border-0 bg-transparent pt-4">

            <h3 class="mb-0">
              Change Password
            </h3>

          </div>

          <div class="card-body p-4">

            <div
              *ngIf="errorMessage"
              class="alert alert-danger">

              {{ errorMessage }}

            </div>

            <form
              [formGroup]="changePasswordForm"
              (ngSubmit)="submit()">

              <div class="mb-3">

                <label class="form-label">
                  Current Password
                </label>

                <input
                  type="password"
                  class="form-control"
                  formControlName="currentPassword">

                <div
                  class="text-danger mt-1"
                  *ngIf="f['currentPassword'].touched && f['currentPassword'].invalid">

                  Current password is required

                </div>

              </div>

              <div class="mb-3">

                <label class="form-label">
                  New Password
                </label>

                <input
                  type="password"
                  class="form-control"
                  formControlName="newPassword">

                <div
                  class="text-danger mt-1"
                  *ngIf="f['newPassword'].touched && f['newPassword'].invalid">

                  <div *ngIf="f['newPassword'].errors?.['required']">
                    New password is required
                  </div>

                  <div *ngIf="f['newPassword'].errors?.['minlength']">
                    Minimum 6 characters required
                  </div>

                </div>

              </div>

              <div class="mb-4">

                <label class="form-label">
                  Confirm New Password
                </label>

                <input
                  type="password"
                  class="form-control"
                  formControlName="confirmNewPassword">

                <div
                  class="text-danger mt-1"
                  *ngIf="f['confirmNewPassword'].touched && f['confirmNewPassword'].invalid">

                  Confirm new password is required

                </div>

              </div>

              <button
                type="submit"
                class="btn btn-primary w-100"
                [disabled]="loading">

                {{ loading ? 'Updating...' : 'Update Password' }}

              </button>

            </form>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>
