trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

variables:
  buildConfiguration: Release
  apiProjectPath: ''
  frontendProjectPath: ''
  frontendDistPath: ''
  testProjectPath: ''

stages:
  - stage: Build
    displayName: Build solutions
    jobs:
      - job: Build
        displayName: Build API and Angular app
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UseDotNet@2
            displayName: Use .NET 8 SDK
            inputs:
              packageType: sdk
              version: 8.0.x

          - task: UseNode@1
            displayName: Use Node.js 22
            inputs:
              version: 22.x

          - bash: |
              set -e
              npm install -g npm@11.6.1
              npm --version
            displayName: Pin npm version

          - bash: |
              set -e

              if [ -f "$(Build.SourcesDirectory)/WMS-Solution.slnx" ]; then
                echo "##vso[task.setvariable variable=apiProjectPath]$(Build.SourcesDirectory)/WMS.API/WMS.API.csproj"
                echo "##vso[task.setvariable variable=frontendProjectPath]$(Build.SourcesDirectory)/WMS.Frontend"
                echo "##vso[task.setvariable variable=frontendDistPath]$(Build.SourcesDirectory)/WMS.Frontend/dist/wms-frontend"
                echo "##vso[task.setvariable variable=testProjectPath]$(Build.SourcesDirectory)/WMS.Tests/WMS.Tests.csproj"
                exit 0
              fi

              if [ -f "$(Build.SourcesDirectory)/WMS-Solution/WMS-Solution.slnx" ]; then
                echo "##vso[task.setvariable variable=apiProjectPath]$(Build.SourcesDirectory)/WMS-Solution/WMS.API/WMS.API.csproj"
                echo "##vso[task.setvariable variable=frontendProjectPath]$(Build.SourcesDirectory)/WMS-Solution/WMS.Frontend"
                echo "##vso[task.setvariable variable=frontendDistPath]$(Build.SourcesDirectory)/WMS-Solution/WMS.Frontend/dist/wms-frontend"
                echo "##vso[task.setvariable variable=testProjectPath]$(Build.SourcesDirectory)/WMS-Solution/WMS.Tests/WMS.Tests.csproj"
                exit 0
              fi

              echo "Could not find WMS-Solution.slnx in the checked-out repository."
              find "$(Build.SourcesDirectory)" -maxdepth 3 \( -name "*.slnx" -o -name "*.sln" \) -print
              exit 1
            displayName: Detect solution layout

          - script: dotnet restore "$(apiProjectPath)"
            displayName: Restore API project

          - bash: |
              set -e
              cd "$(frontendProjectPath)"
              npm ci
            displayName: Install Angular dependencies

          - script: dotnet build "$(apiProjectPath)" --configuration $(buildConfiguration) --no-restore
            displayName: Build .NET solution

          - bash: |
              set -e
              cd "$(frontendProjectPath)"
              npm run build -- --configuration production
            displayName: Build Angular app

  - stage: Test
    displayName: Test automation
    dependsOn: Build
    jobs:
      - job: Test
        displayName: Run API and Angular tests
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UseDotNet@2
            displayName: Use .NET 8 SDK
            inputs:
              packageType: sdk
              version: 8.0.x

          - task: UseNode@1
            displayName: Use Node.js 22
            inputs:
              version: 22.x

          - bash: |
              set -e
              npm install -g npm@11.6.1
              npm --version
            displayName: Pin npm version

          - bash: |
              set -e

              if [ -f "$(Build.SourcesDirectory)/WMS-Solution.slnx" ]; then
                echo "##vso[task.setvariable variable=apiProjectPath]$(Build.SourcesDirectory)/WMS.API/WMS.API.csproj"
                echo "##vso[task.setvariable variable=frontendProjectPath]$(Build.SourcesDirectory)/WMS.Frontend"
                echo "##vso[task.setvariable variable=frontendDistPath]$(Build.SourcesDirectory)/WMS.Frontend/dist/wms-frontend"
                echo "##vso[task.setvariable variable=testProjectPath]$(Build.SourcesDirectory)/WMS.Tests/WMS.Tests.csproj"
                exit 0
              fi

              if [ -f "$(Build.SourcesDirectory)/WMS-Solution/WMS-Solution.slnx" ]; then
                echo "##vso[task.setvariable variable=apiProjectPath]$(Build.SourcesDirectory)/WMS-Solution/WMS.API/WMS.API.csproj"
                echo "##vso[task.setvariable variable=frontendProjectPath]$(Build.SourcesDirectory)/WMS-Solution/WMS.Frontend"
                echo "##vso[task.setvariable variable=frontendDistPath]$(Build.SourcesDirectory)/WMS-Solution/WMS.Frontend/dist/wms-frontend"
                echo "##vso[task.setvariable variable=testProjectPath]$(Build.SourcesDirectory)/WMS-Solution/WMS.Tests/WMS.Tests.csproj"
                exit 0
              fi

              echo "Could not find WMS-Solution.slnx in the checked-out repository."
              find "$(Build.SourcesDirectory)" -maxdepth 3 \( -name "*.slnx" -o -name "*.sln" \) -print
              exit 1
            displayName: Detect solution layout

          - script: dotnet restore "$(testProjectPath)"
            displayName: Restore test project

          - bash: |
              set -e
              cd "$(frontendProjectPath)"
              npm ci
            displayName: Install Angular dependencies

          - script: dotnet test "$(testProjectPath)" --configuration $(buildConfiguration) --no-restore --collect "XPlat Code Coverage" --logger "trx" --results-directory "$(Agent.TempDirectory)/TestResults"
            displayName: Run .NET tests

          - task: PublishTestResults@2
            displayName: Publish .NET test results
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: VSTest
              testResultsFiles: "**/*.trx"
              searchFolder: $(Agent.TempDirectory)/TestResults
              failTaskOnFailedTests: true

          - bash: |
              set -e
              cd "$(frontendProjectPath)"
              npm run test -- --watch=false
            displayName: Run Angular tests

  - stage: Package
    displayName: Package artifacts
    dependsOn: Test
    jobs:
      - job: Package
        displayName: Publish API and frontend artifacts
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UseDotNet@2
            displayName: Use .NET 8 SDK
            inputs:
              packageType: sdk
              version: 8.0.x

          - task: UseNode@1
            displayName: Use Node.js 22
            inputs:
              version: 22.x

          - bash: |
              set -e
              npm install -g npm@11.6.1
              npm --version
            displayName: Pin npm version

          - bash: |
              set -e

              if [ -f "$(Build.SourcesDirectory)/WMS-Solution.slnx" ]; then
                echo "##vso[task.setvariable variable=apiProjectPath]$(Build.SourcesDirectory)/WMS.API/WMS.API.csproj"
                echo "##vso[task.setvariable variable=frontendProjectPath]$(Build.SourcesDirectory)/WMS.Frontend"
                echo "##vso[task.setvariable variable=frontendDistPath]$(Build.SourcesDirectory)/WMS.Frontend/dist/wms-frontend"
                echo "##vso[task.setvariable variable=testProjectPath]$(Build.SourcesDirectory)/WMS.Tests/WMS.Tests.csproj"
                exit 0
              fi

              if [ -f "$(Build.SourcesDirectory)/WMS-Solution/WMS-Solution.slnx" ]; then
                echo "##vso[task.setvariable variable=apiProjectPath]$(Build.SourcesDirectory)/WMS-Solution/WMS.API/WMS.API.csproj"
                echo "##vso[task.setvariable variable=frontendProjectPath]$(Build.SourcesDirectory)/WMS-Solution/WMS.Frontend"
                echo "##vso[task.setvariable variable=frontendDistPath]$(Build.SourcesDirectory)/WMS-Solution/WMS.Frontend/dist/wms-frontend"
                echo "##vso[task.setvariable variable=testProjectPath]$(Build.SourcesDirectory)/WMS-Solution/WMS.Tests/WMS.Tests.csproj"
                exit 0
              fi

              echo "Could not find WMS-Solution.slnx in the checked-out repository."
              find "$(Build.SourcesDirectory)" -maxdepth 3 \( -name "*.slnx" -o -name "*.sln" \) -print
              exit 1
            displayName: Detect solution layout

          - script: dotnet restore "$(apiProjectPath)"
            displayName: Restore API project

          - bash: |
              set -e
              cd "$(frontendProjectPath)"
              npm ci
            displayName: Install Angular dependencies

          - bash: |
              set -e
              cd "$(frontendProjectPath)"
              npm run build -- --configuration production
            displayName: Build Angular app for release

          - script: dotnet publish "$(apiProjectPath)" --configuration $(buildConfiguration) --output "$(Build.ArtifactStagingDirectory)/api" --no-restore
            displayName: Publish API

          - task: CopyFiles@2
            displayName: Stage Angular output
            inputs:
              SourceFolder: $(frontendDistPath)
              Contents: "**"
              TargetFolder: "$(Build.ArtifactStagingDirectory)/frontend"

          - task: PublishPipelineArtifact@1
            displayName: Publish API artifact
            inputs:
              targetPath: "$(Build.ArtifactStagingDirectory)/api"
              artifact: api-drop

          - task: PublishPipelineArtifact@1
            displayName: Publish Angular artifact
            inputs:
              targetPath: 'WMS-Solution/WMS.Frontend/dist/wms-frontend/browser'
              artifact: frontend-drop