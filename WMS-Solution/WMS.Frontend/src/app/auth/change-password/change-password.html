<div class="change-password-page">

  <div class="container py-5 change-password-page__container">

    <div class="row justify-content-center">

      <div class="col-lg-6 col-xl-5">

        <div class="card change-password-card">

          <div class="card-header text-center border-0 bg-transparent pt-4 px-4">

            <span class="page-kicker">Security</span>

            <h3 class="mb-0 mt-3">
              Change Password
            </h3>

            <p class="change-password-card__copy mb-0 mt-2">
              Update your credentials to keep your workspace secure.
            </p>

          </div>

          <div class="card-body p-4 p-lg-5">

            <div
              *ngIf="errorMessage"
              class="auth-inline-alert mb-3">

              {{ errorMessage }}

            </div>

            <form
              [formGroup]="changePasswordForm"
              (ngSubmit)="submit()">

              <div class="mb-3">

                <label class="form-label">
                  Current Password
                </label>

                <div class="input-group auth-password-group">
                  <input
                    [type]="showCurrentPassword ? 'text' : 'password'"
                    class="form-control"
                    formControlName="currentPassword"
                    autocomplete="current-password">

                  <button
                    type="button"
                    class="btn btn-outline-secondary auth-password-toggle"
                    (click)="toggleCurrentPassword()">

                    {{ showCurrentPassword ? 'Hide' : 'Show' }}

                  </button>
                </div>

                <div
                  class="text-danger mt-1"
                  *ngIf="f['currentPassword'].touched && f['currentPassword'].invalid">

                  Current password is required

                </div>

              </div>

              <div class="mb-3">

                <label class="form-label">
                  New Password
                </label>

                <div class="input-group auth-password-group">
                  <input
                    [type]="showNewPassword ? 'text' : 'password'"
                    class="form-control"
                    formControlName="newPassword"
                    autocomplete="new-password">

                  <button
                    type="button"
                    class="btn btn-outline-secondary auth-password-toggle"
                    (click)="toggleNewPassword()">

                    {{ showNewPassword ? 'Hide' : 'Show' }}

                  </button>
                </div>

                <div
                  class="text-danger mt-1"
                  *ngIf="f['newPassword'].touched && f['newPassword'].invalid">

                  <div *ngIf="f['newPassword'].errors?.['required']">
                    New password is required
                  </div>

                  <div *ngIf="f['newPassword'].errors?.['minlength']">
                    Minimum 6 characters required
                  </div>

                </div>

              </div>

              <div class="mb-4">

                <label class="form-label">
                  Confirm New Password
                </label>

                <div class="input-group auth-password-group">
                  <input
                    [type]="showConfirmNewPassword ? 'text' : 'password'"
                    class="form-control"
                    formControlName="confirmNewPassword"
                    autocomplete="new-password">

                  <button
                    type="button"
                    class="btn btn-outline-secondary auth-password-toggle"
                    (click)="toggleConfirmNewPassword()">

                    {{ showConfirmNewPassword ? 'Hide' : 'Show' }}

                  </button>
                </div>

                <div
                  class="text-danger mt-1"
                  *ngIf="f['confirmNewPassword'].touched && f['confirmNewPassword'].invalid">

                  Confirm new password is required

                </div>

              </div>

              <button
                type="submit"
                class="btn btn-primary w-100"
                [disabled]="loading">

                {{ loading ? 'Updating...' : 'Update Password' }}

              </button>

              <div class="auth-form-footer mt-3">
                The new credential will be required the next time you sign in.
              </div>

            </form>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>
